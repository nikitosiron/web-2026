<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    <title>login</title>
</head>

<body>
    <div class="main">
        <h1 class="h1">Войти</h1>
        <img src="image/loginImage.png" alt="loginImage" class="logImage">
    </div>
    <form action="" class="form">
        <p class="formText">Электронная почта</p>
        <input type="email" class="inputLog">
        <p class="formTextUnder">Введите электропочту в формате *****@***.**</p>
        <p class="formText">Пароль</p>
        <div>
            <input type="password" class="inputLog">
            <img src="image/eyePassword.png" alt="EyePassword">
        </div>
        <button class="enterButton">Продолжить</button>
    </form>
</body>

</html>
