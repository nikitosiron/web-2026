<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    <title>profile</title>
</head>
<body>
  <div class="header">
        <img src="images/menuHome.png" alt="home">
        <img src="images/menuProfile.png" alt="profile">
        <img src="images/menuPlus.png" alt="plus">
    </div> 
    <div class="post">
        <div class="post-foto">
            <div class="foto-box">
                <div class="box-add">
                    <img src="images/nonamefoto.png" alt="foto" class="add-foto">
                    <button class="add-button">Добавить фото</button>
                </div>
            </div>
            <div class="foto-add"> 
                <p class="add-text"><img src="images/plus.png" alt="add">Добавить фото</p>
                <p class="add-inscription">Добавить подпись...</p>
            </div>
        </div>
        <button class="post-share">Поделиться</button>
    </div> 
</body>
</html>
